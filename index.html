<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MANGA SLOT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;height:100vh;font-family:'Impact',sans-serif}
canvas{width:100%;height:100%;display:block;cursor:grab}
canvas:active{cursor:grabbing}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';

var SYMS=['cherry','bell','seven','star','fish'];
var NS=SYMS.length, creds=10, spin=false;

// RENDERER
var cv=document.getElementById('c');
var R=new THREE.WebGLRenderer({canvas:cv,antialias:true,powerPreference:'high-performance'});
var dpr=Math.min(window.devicePixelRatio||1,2);
R.setPixelRatio(dpr);
R.setSize(innerWidth,innerHeight);
R.setClearColor(0xFFFFFF);
R.outputEncoding=THREE.sRGBEncoding;

var S=new THREE.Scene();
S.background=new THREE.Color(0xFFFFFF);
S.fog=new THREE.Fog(0xFFFFFF,20,50);

var cam=new THREE.PerspectiveCamera(38,innerWidth/innerHeight,0.1,100);
var orb={th:0.4,ph:1.0,r:13,tx:0,ty:1.2,tz:0};
function uc(){
cam.position.set(orb.tx+orb.r*Math.sin(orb.ph)*Math.sin(orb.th),orb.ty+orb.r*Math.cos(orb.ph),orb.tz+orb.r*Math.sin(orb.ph)*Math.cos(orb.th));
cam.lookAt(orb.tx,orb.ty,orb.tz);
}
uc();

// CONTROLS
var dr=false,lx=0,ly=0,pd=0;
cv.onmousedown=function(e){dr=true;lx=e.clientX;ly=e.clientY};
cv.onmousemove=function(e){if(!dr)return;orb.th-=(e.clientX-lx)*.005;orb.ph=Math.max(.25,Math.min(1.5,orb.ph+(e.clientY-ly)*.005));lx=e.clientX;ly=e.clientY;uc()};
cv.onmouseup=cv.onmouseleave=function(){dr=false};
cv.onwheel=function(e){e.preventDefault();orb.r=Math.max(4,Math.min(25,orb.r+e.deltaY*.007));uc()};
cv.ontouchstart=function(e){if(e.touches.length===1){dr=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY}else if(e.touches.length===2){dr=false;var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pd=Math.sqrt(dx*dx+dy*dy)}};
cv.ontouchmove=function(e){e.preventDefault();if(e.touches.length===1&&dr){orb.th-=(e.touches[0].clientX-lx)*.005;orb.ph=Math.max(.25,Math.min(1.5,orb.ph+(e.touches[0].clientY-ly)*.005));lx=e.touches[0].clientX;ly=e.touches[0].clientY;uc()}else if(e.touches.length===2){var dx2=e.touches[0].clientX-e.touches[1].clientX,dy2=e.touches[0].clientY-e.touches[1].clientY,nd=Math.sqrt(dx2*dx2+dy2*dy2);orb.r=Math.max(4,Math.min(25,orb.r+(pd-nd)*.025));pd=nd;uc()}};
cv.ontouchend=function(){dr=false};

// LIGHTS
S.add(new THREE.AmbientLight(0xFFFFFF,.7));
var L1=new THREE.DirectionalLight(0xFFFFFF,2);L1.position.set(5,12,8);S.add(L1);
var L2=new THREE.DirectionalLight(0xBBBBBB,.4);L2.position.set(-5,3,-4);S.add(L2);

// MATERIALS
var mB=new THREE.MeshToonMaterial({color:0x000000});
var mW=new THREE.MeshToonMaterial({color:0xFFFFFF});
var mG=new THREE.MeshToonMaterial({color:0x555555});
var mD=new THREE.MeshToonMaterial({color:0xAAAAAA});

function edge(m){m.add(new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry,15),new THREE.LineBasicMaterial({color:0x000000})))}

// === SYMBOL TEXTURES (1024x1024 each, clean manga line art) ===
function mkSym(idx){
var c=document.createElement('canvas');c.width=1024;c.height=1024;
var x=c.getContext('2d');
x.fillStyle='#FFF';x.fillRect(0,0,1024,1024);
x.strokeStyle='#000';x.lineWidth=14;
x.strokeRect(6,6,1012,1012);

x.fillStyle='#000';x.strokeStyle='#000';x.lineCap='round';x.lineJoin='round';
var cx=512,cy=512;

if(idx===0){
// Cherry blossom - clean 5 petal
x.lineWidth=9;
for(var i=0;i<5;i++){
var a=(i*72-90)*Math.PI/180;
x.save();x.translate(cx+100*Math.cos(a),cy+100*Math.sin(a));x.rotate(a);
x.beginPath();x.ellipse(0,0,60,28,0,0,Math.PI*2);x.fill();x.stroke();
x.restore();
}
x.beginPath();x.arc(cx,cy,45,0,Math.PI*2);x.fill();
x.strokeStyle='#FFF';x.lineWidth=5;x.beginPath();x.arc(cx,cy,26,0,Math.PI*2);x.stroke();
x.beginPath();x.arc(cx,cy,12,0,Math.PI*2);x.fill();
} else if(idx===1){
// Bell
x.beginPath();
x.moveTo(cx-65,cy+50);x.quadraticCurveTo(cx-85,cy-25,cx-55,cy-95);
x.quadraticCurveTo(cx,cy-120,cx+55,cy-95);
x.quadraticCurveTo(cx+85,cy-25,cx+65,cy+35);
x.closePath();x.fill();
x.strokeStyle='#FFF';x.lineWidth=9;x.beginPath();x.moveTo(cx-80,cy+50);x.lineTo(cx+80,cy+50);x.stroke();
x.fillStyle='#000';x.beginPath();x.arc(cx,cy+80,24,0,Math.PI*2);x.fill();
x.strokeStyle='#000';x.lineWidth=6;x.beginPath();x.arc(cx,cy-100,15,0,Math.PI*2);x.stroke();
} else if(idx===2){
// SEVEN - big bold
x.font='bold 280px Impact,Arial Black,sans-serif';
x.textAlign='center';x.textBaseline='middle';
x.strokeStyle='#000';x.lineWidth=10;x.strokeText('7',cx,cy+8);
x.fillStyle='#000';x.fillText('7',cx,cy+8);
} else if(idx===3){
// Star
x.beginPath();
for(var s=0;s<5;s++){
var oA=(s*72-90)*Math.PI/180,iA=((s*72)+36-90)*Math.PI/180;
var ox=cx+120*Math.cos(oA),oy=cy+120*Math.sin(oA);
var ix=cx+50*Math.cos(iA),iy=cy+50*Math.sin(iA);
if(s===0)x.moveTo(ox,oy);else x.lineTo(ox,oy);
x.lineTo(ix,iy);
}
x.closePath();x.fill();
x.fillStyle='#FFF';x.beginPath();x.arc(cx,cy,32,0,Math.PI*2);x.fill();
x.strokeStyle='#000';x.lineWidth=5;x.beginPath();x.arc(cx,cy,16,0,Math.PI*2);x.fill();
} else if(idx===4){
// Taiyaki
x.beginPath();
x.moveTo(cx-110,cy);x.quadraticCurveTo(cx-55,cy-80,cx+55,cy-65);
x.quadraticCurveTo(cx+115,cy-48,cx+125,cy);
x.quadraticCurveTo(cx+115,cy+48,cx+55,cy+65);
x.quadraticCurveTo(cx-55,cy+80,cx-110,cy);
x.closePath();x.fill();
// Tail
x.beginPath();x.moveTo(cx-105,cy);x.lineTo(cx-155,cy-55);x.lineTo(cx-130,cy);x.lineTo(cx-155,cy+55);x.closePath();x.fill();
// Eye
x.fillStyle='#FFF';x.beginPath();x.arc(cx+65,cy-18,20,0,Math.PI*2);x.fill();
x.fillStyle='#000';x.beginPath();x.arc(cx+68,cy-18,10,0,Math.PI*2);x.fill();
// Smile
x.strokeStyle='#FFF';x.lineWidth=5;x.beginPath();x.arc(cx+95,cy+8,20,.5,2.2);x.stroke();
// Scales
x.strokeStyle='rgba(255,255,255,.3)';x.lineWidth=3;
for(var sc=-25;sc<35;sc+=18){x.beginPath();x.arc(cx+sc,cy,28,-.9,.9);x.stroke()}
}

var t=new THREE.CanvasTexture(c);t.needsUpdate=true;return t;
}

var symTex=[];for(var i=0;i<NS;i++)symTex.push(mkSym(i));

// === 3D MANGA MACHINE ===
var M=new THREE.Group();S.add(M);

// Main body - angular manga-style shape
var body=new THREE.Mesh(new THREE.BoxGeometry(7,5.5,3),mB);
body.position.set(0,1,0);edge(body);M.add(body);

// Front panel with decorative border
var fp=new THREE.Mesh(new THREE.BoxGeometry(6.5,5,0.15),mW);
fp.position.set(0,1,1.51);edge(fp);M.add(fp);

// TOP SIGN - explosive manga shape
var ts=new THREE.Mesh(new THREE.BoxGeometry(7.8,1,3.4),mB);
ts.position.set(0,4,0);edge(ts);M.add(ts);

// Sign front (white)
var sf=new THREE.Mesh(new THREE.BoxGeometry(5,0.6,0.12),mW);
sf.position.set(0,4,1.72);edge(sf);M.add(sf);

// BASE
var bs=new THREE.Mesh(new THREE.BoxGeometry(7.4,.4,3.2),mB);
bs.position.set(0,-1.6,0);edge(bs);M.add(bs);

// Coin slot - manga style
var csp=new THREE.Mesh(new THREE.BoxGeometry(.7,1.2,0.1),mD);
csp.position.set(0,-1,1.52);edge(csp);M.add(csp);
var csl=new THREE.Mesh(new THREE.BoxGeometry(.15,.7,.12),mB);
csl.position.set(0,-1,1.53);edge(csl);M.add(csl);

// Side panels with speed line texture
for(var sd=-1;sd<=1;sd+=2){
var sp=new THREE.Mesh(new THREE.BoxGeometry(.25,4.8,2.8),mG);
sp.position.set(sd*3.6,1,0);edge(sp);M.add(sp);
}

// === REELS ===
var segAng=Math.PI*2/NS;
var reels=[];
var rX=[-1.95,0,1.95];

for(var r=0;r<3;r++){
var rg=new THREE.Group();rg.position.set(rX[r],1.3,1.55);M.add(rg);

// Drum
var dg=new THREE.CylinderGeometry(1.2,1.2,1.7,64);
var dm=new THREE.MeshToonMaterial({color:0xCCCCCC});
var drum=new THREE.Mesh(dg,dm);drum.rotation.z=Math.PI/2;edge(drum);rg.add(drum);

// End caps
for(var ec=-1;ec<=1;ec+=2){
var cap=new THREE.Mesh(new THREE.CylinderGeometry(1.25,1.25,.1,64),mB);
cap.rotation.x=Math.PI/2;cap.position.set(ec*.76,0,0);edge(cap);rg.add(cap);
}

// Symbol planes around cylinder
var syms=[];
for(var f=0;f<NS;f++){
var a=f*segAng;
var pw=new THREE.Mesh(
new THREE.PlaneGeometry(2.0,1.6),
new THREE.MeshBasicMaterial({map:symTex[f],side:THREE.DoubleSide})
);
pw.position.set(0,1.35*Math.sin(a),1.35*Math.cos(a));
pw.rotation.x=-a;
rg.add(pw);
syms.push({mesh:pw,ba:a});
}

reels.push({g:rg,s:syms,tgt:Math.floor(Math.random()*NS),ang:0,sp:false,speed:0,stp:false});
}

// WINDOW FRAME - bold manga bars
function bar(w,h,d,px,py,pz){
var b=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mB);b.position.set(px,py,pz);edge(b);M.add(b);
}
bar(6.5,.4,.12,0,2.7,1.62);
bar(6.5,.4,.12,0,-.1,1.62);
bar(.2,2.8,.12,-.97,1.3,1.62);
bar(.2,2.8,.12,.97,1.3,1.62);

// Center line
var cli=new THREE.Mesh(new THREE.BoxGeometry(6.5,.06,.14),mB);
cli.position.set(0,1.3,1.68);M.add(cli);

// === LEVER ===
var lv=new THREE.Group();lv.position.set(4.2,1,0);M.add(lv);

var lbase=new THREE.Mesh(new THREE.CylinderGeometry(.35,.42,.5,32),mB);
lbase.position.y=0;edge(lbase);lv.add(lbase);

var piv=new THREE.Group();piv.position.y=.25;lv.add(piv);

var sh=new THREE.Mesh(new THREE.CylinderGeometry(.13,.13,2.5,24),mD);
sh.position.y=1.25;edge(sh);piv.add(sh);

var bl=new THREE.Mesh(new THREE.SphereGeometry(.45,32,32),mB);
bl.position.y=2.6;edge(bl);piv.add(bl);

// Highlight
var hl=new THREE.Mesh(new THREE.SphereGeometry(.14,16,16),mW);
hl.position.set(.2,2.75,.28);piv.add(hl);

// Chrome ring
var rn=new THREE.Mesh(new THREE.TorusGeometry(.22,.05,8,32),mD);
rn.position.y=.25;rn.rotation.x=Math.PI/2;piv.add(rn);

// === SPEED LINES DECORATION (3D planes on the back wall) ===
var slCanvas=document.createElement('canvas');slCanvas.width=2048;slCanvas.height=2048;
var slx=slCanvas.getContext('2d');
slx.fillStyle='#F0F0F0';slx.fillRect(0,0,2048,2048);
slx.strokeStyle='#000';slx.lineWidth=2;slx.globalAlpha=.08;
for(var sl=0;sl<120;sl++){
var sx=1024,sy=1024;
var sa=(sl/120)*Math.PI*2;
slx.beginPath();slx.moveTo(sx,sy);
slx.lineTo(sx+Math.cos(sa)*1400,sy+Math.sin(sa)*1400);
slx.stroke();
}
slx.globalAlpha=1;
var slTex=new THREE.CanvasTexture(slCanvas);
var slPlane=new THREE.Mesh(new THREE.PlaneGeometry(20,15),new THREE.MeshBasicMaterial({map:slTex,transparent:true,opacity:.3}));
slPlane.position.set(0,4,-3);
S.add(slPlane);

// === MANGA ACTION STAR DECORATIONS ===
function mkStar3D(sz){
var shape=new THREE.Shape();
for(var i=0;i<5;i++){
var oA=(i*72-90)*Math.PI/180,iA=((i*72)+36-90)*Math.PI/180;
if(i===0)shape.moveTo(sz*Math.cos(oA),sz*Math.sin(oA));
else shape.lineTo(sz*Math.cos(oA),sz*Math.sin(oA));
shape.lineTo(sz*.4*Math.cos(iA),sz*.4*Math.sin(iA));
}
shape.closePath();
var geo=new THREE.ExtrudeGeometry(shape,{depth:.15,bevelEnabled:false});
var mesh=new THREE.Mesh(geo,mB);edge(mesh);return mesh;
}

var star1=mkStar3D(.6);star1.position.set(-3,4.2,1);star1.rotation.z=.3;M.add(star1);
var star2=mkStar3D(.4);star2.position.set(3,4.2,1);star2.rotation.z=-.5;M.add(star2);

// === FLOOR ===
var fl=new THREE.Mesh(new THREE.PlaneGeometry(50,50),new THREE.MeshToonMaterial({color:0xEEEEEE}));
fl.rotation.x=-Math.PI/2;fl.position.y=-1.9;S.add(fl);

var grd=new THREE.GridHelper(50,50,0x000000,0xBBBBBB);
grd.position.y=-1.89;grd.material.transparent=true;grd.material.opacity=.1;
S.add(grd);

// === RAYCASTER ===
var ray=new THREE.Raycaster(),mV=new THREE.Vector2();

// === ANIMATE LEVER ===
function animLever(cb){
var t=0;
(function step(){
t+=.035;
if(t<=1){
piv.rotation.z=-(t<.5?(t/.5):(1-(t-.5)/.5))*Math.PI/4;
requestAnimationFrame(step);
}else{piv.rotation.z=0;if(cb)cb()}
})();
}

// === SPIN ===
function doSpin(){
if(spin||creds<1)return;
creds--;spin=true;
animLever(function(){
for(var i=0;i<3;i++){
var rd=reels[i];rd.tgt=Math.floor(Math.random()*NS);rd.sp=true;rd.stp=false;rd.speed=.16+Math.random()*.05;
}
setTimeout(function(){reels[0].stp=true},1400);
setTimeout(function(){reels[1].stp=true},2200);
setTimeout(function(){reels[2].stp=true},3000);
});
}

// === TICK ===
function tick(){
for(var i=0;i<3;i++){
var rd=reels[i];if(!rd.sp)continue;
rd.ang+=rd.speed;
if(rd.stp){
rd.speed*=.91;
if(rd.speed<.0015){
rd.ang=-rd.tgt*segAng;rd.sp=false;rd.speed=0;
}
}
rd.g.rotation.x=rd.ang;
// Update symbol faces
for(var f=0;f<rd.s.length;f++){
var wa=rd.s[f].ba+rd.ang;
var n=((wa%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
var si=Math.round(n/segAng)%NS;
rd.s[f].mesh.material.map=symTex[si];
rd.s[f].mesh.material.needsUpdate=true;
}
}
if(spin&&reels.every(function(r){return!r.sp})){
spin=false;
var c=[reels[0].tgt,reels[1].tgt,reels[2].tgt];
if(c[0]===c[1]&&c[1]===c[2])creds+=20;
}
}

cv.onclick=function(e){
mV.x=(e.clientX/innerWidth)*2-1;mV.y=-(e.clientY/innerHeight)*2+1;
ray.setFromCamera(mV,cam);
if(ray.intersectObjects(piv.children,true).length)doSpin();
};
cv.ontouchend=function(e){
if(e.changedTouches.length===1&&!dr){
mV.x=(e.changedTouches[0].clientX/innerWidth)*2-1;
mV.y=-(e.changedTouches[0].clientY/innerHeight)*2+1;
ray.setFromCamera(mV,cam);
if(ray.intersectObjects(piv.children,true).length)doSpin();
}
};

onresize=function(){cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();R.setSize(innerWidth,innerHeight)};

(function animate(){requestAnimationFrame(animate);tick();R.render(S,cam)})();

})();
</script>
</body>
</html>
